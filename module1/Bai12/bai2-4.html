<!DOCTYPE html>
<html lang="en">
<head>
    <title>Đại học khoa học tự nhiên</title>
    <style>
        main{width: 1000px}
        th{
            background-color: #d6eeee;
        }
        table, th, td {
            border: 4px solid blue;
            border-collapse: collapse;
            
        }
        td{
            border-bottom-color: black;
        }
        
    </style>
</head>
<body>
    <table id="tableForm" border = "1 solid blue" style="width: 1000px">
        <tr>
            <th style = "width: 20%">component</th>
            <th>Display</th>
        </tr>
        <tr>
            <td>Input Text</td>
            <td>
                <Input type ="text" id="iptext" name="iptext"></Input>
            </td>
        </tr>
        <tr>
            <td> Textarea</td>
            <td>
                <textarea name="textArea" rows ="4" cols ="50" ></textarea>
            </td>
        </tr>
        <tr>
            <td>
                Button
            </td>
            <td>
                <button>Click me</button>
            </td>
        </tr>
        <tr>
            <td>
                Radio button
            </td>
            <td>
                <input type="radio" id="opt" name ="opt" value="1" />Option 1 </br>
                <input type="radio" id="opt" name ="opt" value="2" />Option 2 </br>
                <input type="radio" id="opt" name ="opt" value="3" />Option 3 </br>
            </td>
        </tr>    
        <tr>
            <td>
                Multiple selection
            </td>
            <td>
                <input type="checkbox" id="checkbox" name ="checkbox" value="1" />checkbox 1 </br>
                <input type="checkbox" id="checkbox" name ="checkbox" value="2" />checkbox 2 </br>
                <input type="checkbox" id="checkbox" name ="checkbox" value="3" />checkbox 3 </br>
            </td>
        </tr>
        <tr>
            <td>
                Dropdown
            </td>
            <td>
               <select name="cars" id="cars">Volvo
                    <option value="Volvo" selected>Volvo</option>
                    <option value="BMW">BMW</option>
                    <option value="Mecedes">Mecedes</option>
                    <option value="Honda">Honda</option>
               </select>
            </td>
        </tr>
        <tr>
            <td>
                File select
            </td>
            <td>
                <input type="file" id="uploadImage" name ="uploadImage"/>
            </td>
        </tr>
    </table>
</body>
</html>
