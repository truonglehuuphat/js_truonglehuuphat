<!DOCTYPE html>
<html lang="en">
<head>
    <title>Đại học khoa học tự nhiên</title>
    <style>
        .container{
            display: flex;
            flex-wrap: wrap;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
            width: 200px;
            padding:10px;
            gap:10px;
        }
        .typeInput{
            width: 100%;
            box-sizing: border-box
        }
        .btn{
            width: 100%;
            height: 10%;
            background-color: green;
            color: white
        }
        #divchk{
            width: 100%;
            text-align: left; /* Chữ "Remember me" sẽ căn trái */
        }
        .chkbox{
            align-items: left ;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <img src="C:\Users\Admin\Documents\GitHub\js_truonglehuuphat\module1\Bai34\login-img.png" alt="icon-login" width="100px">
       
        <label for="username" class="username">UserName
            <input class="typeInput" type="username" id="username" name = "username" placeholder = "Enter Username"/>
        </label>
        <label for="password" class="password">Password
            <input class="typeInput" type="password" id="password" name = "password" placeholder = "Enter password"/>
        </label>
        
        <div id="divchk">
            <button class="btn" id="button" click="" >Login</button>
            <input class="chkbox" type="checkbox" id="ckbRememberMe" name="ckbRememberMe"/>Remember me
        </div>
    </div>
   
    
</body>
</html>
